<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Video Player</title>
    <style>
        /* The container centers the video on the page */
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }

        /* The video adjusts to the width, but never larger than its real size */
        video {
            width: 100%;
            max-width: 1920px;  /* Original size of the video */
            height: auto;       /* Maintains the 16:9 aspect ratio */
            border-radius: 8px; /* Optional: rounded corners for a modern look */
            background-color: #000; /* Adds a black background while loading */
        }
        
        /* Basic styling for the heading to make it look professional */
        h1 {
            text-align: center;
            font-family: Arial, sans-serif;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>My Custom Video Player</h1>

    <div class="video-container">
        <video width="1920" height="1080" controls loop muted autoplay preload="metadata">
            
            <source src="my_video_h.265.mp4" type="video/mp4; codecs=hevc">
            
            <source src="my_video.webm" type="video/webm">
            
            <source src="my_video.mp4" type="video/mp4">
            
            Your browser does not support the HTML5 video tag. Please update your browser.
        </video>
    </div>

</body>
</html>
