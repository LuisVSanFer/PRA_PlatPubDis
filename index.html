<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Vertical Video</title>
    <style>
        body { 
            margin: 0; 
            padding: 2vh; 
            text-align: center; 
            background-color: #111; 
        }
        
        video { 
            /* Prevents horizontal overflow */
            max-width: 100%; 
            /* Prevents vertical overflow (leaves a small margin) */
            max-height: 90vh; 
        }
    </style>
</head>
<body>

    <video width="1080" height="1920" controls loop muted autoplay preload="metadata">
        <source src="my_video_h.265.mp4" type="video/mp4; codecs=hevc">
        <source src="my_video.webm" type="video/webm">
        <source src="my_video.mp4" type="video/mp4">
    </video>

</body>
</html>
