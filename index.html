<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Video Player</title>
    <style>
        /* Minimalist CSS: Centers content and makes video responsive */
        body { text-align: center; font-family: sans-serif; margin-top: 20px; }
        video { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <h1>My Custom Video Player</h1>

    <video width="1920" height="1080" controls loop muted autoplay preload="metadata">
        
        <source src="my_video_h.265.mp4" type="video/mp4; codecs=hevc">
        <source src="my_video.webm" type="video/webm">
        <source src="my_video.mp4" type="video/mp4">
        
        Your browser does not support the HTML5 video tag.
    </video>

</body>
</html>
